# lifeline default configuration (portable — read by core/commands/lifecycle.md on every
# harness; override per repo with .lifeline/config.yaml or per invocation with flags).

wizard_schema_version: 1     # current set of required .lifelinerc keys. A complete .lifelinerc
                             # at this version skips the setup wizard entirely (ask-once). Bump
                             # this when a release adds a required key — the wizard then re-asks
                             # ONLY the new keys, not the whole set. Stored as schema_version in
                             # each repo's .lifelinerc.
retry_cap: 3                 # test/review retry attempts per wave before @ask_user
autonomy: gated              # gated (pause at spec/plan/merge) | auto (pause at merge only)
isolation: branch            # default offered at the startup wizard: worktree (FULL only) |
                             # branch (new lifeline/<scope> in place) | current (no new branch).
                             # The hard pre-commit @run_hook gate keys on the lifeline/* prefix,
                             # so 'current' makes that gate inert — tdd-discipline self-check still runs.
diff_size_warn: 500          # added-lines threshold for the post-edit reminder / self-check
artifact_root: ".lifeline"   # cycle artifacts live at <artifact_root>/<scope>/. Per project,
                             # a repo-root .lifelinerc (written by the startup wizard) overrides
                             # this — an in-repo path or an absolute path outside the repo.

dispatch_mode: auto          # how @dispatch_agent runs roles — a real perf/cost tradeoff, not a
                             # capability claim. auto (recommended) | agent | inline.
                             #   agent    : isolated context per role (parallel where the adapter
                             #              supports it). Wins on parallel multi-task waves and
                             #              large effort (context isolation), but each dispatch pays
                             #              a cold-start cost (re-read skill + contract + files).
                             #   inline   : run the role's skill in the current (warm) context.
                             #              No cold-start, cheaper + faster for single-task /
                             #              trivial-small / sequential work. First-class CHOICE here,
                             #              not only a degradation. Same payload, same artifacts.
                             #   auto     : per dispatch — agent when a wave has >=2 independent
                             #              tasks OR effort is large; inline otherwise (single-task
                             #              waves, trivial/small effort, single-role spec/plan/review).
                             # Degraded tiers (no agent native) are always inline regardless.

# Single effort-scaled four-lens review — fixed shape, no reviewer-mode toggles.
review:
  lenses: [logic, architecture, security, performance]   # always all four
  block_on:
    logic: [blocker, major]
    architecture: [blocker]
    security: [critical, high]
    performance: [critical]
  depth_by_effort:           # see core/contracts/REVIEW_FINDINGS.md
    trivial: light
    small: light
    medium: standard
    large: deep

# Lint & test/coverage commands — USER-DEFINED, not imposed. The setup wizard runs the
# detecting-project-tooling skill, proposes the project's OWN commands, the user confirms,
# and the result is written to the repo's .lifelinerc as `lint:` / `test:` lists. Lifeline
# never picks a tool when the user has one. These keys are NOT set here — defaults.yaml only
# documents the shape; the built-in extension map below is the LAST-RESORT fallback used
# only when nothing is configured AND the tool happens to be installed (loud warn either way).
#
#   lint:                              # ordered. A changed file's SCOPE = its first
#                                      # (most-specific) matching glob; then EVERY entry
#                                      # sharing that exact glob runs (linters chain).
#     - match: "**/*.go"               # one scope, three linters -> all three run:
#       cmd: "make gofmt"
#     - match: "**/*.go"
#       cmd: "make govet"
#     - match: "**/*.go"
#       cmd: "make gosec"
#     - match: "services/api/**"       # path prefix = per-package (monorepo) scope.
#       cmd: "golangci-lint run {file}" # a file here picks THIS scope, not **/*.go above
#     - match: "**/*.ts"               # **/*.ext = by extension anywhere
#       cmd: "eslint {file}"           # {file} present  -> run per changed file (scoped)
#   test:                              # test is FIRST-MATCH-WINS (one coverage tool per
#     - match: "services/api/**"       # package, not chained — unlike lint)
#       cmd: "go test ./..."
#       coverage: "go test -coverprofile=/tmp/ll ./... && go tool cover -func=/tmp/ll"
#     - match: "**"
#       cmd: "npm test"
#       coverage: "npm test -- --coverage"   # no {file} -> whole-project entrypoint, run once
#
# Two contracts the lint.map grouping leans on (detection MUST honor both):
#   1. Same group = BYTE-IDENTICAL glob string ("serviceA/**" != "serviceA/**/").
#   2. Specific globs ordered BEFORE general ones; most-specific scope wins, NO inheritance
#      (a file gets its scope's cmds only — repeat a shared cmd under a scope if you want it).
# Supported glob subset (hook + grouping honor exactly this): ** , dir/** , **/*.ext , *.ext.
# {file} = changed file path (quoted-substituted); {module} = changed module for --cov= style.
# The orchestrator flattens `lint:` to .lifeline/lint.map (glob<TAB>cmd) so the bash
# pre-commit hook reads it WITHOUT a YAML parser. Regenerated on `start` and `--reconfigure`.

# Built-in lint fallback map — LAST RESORT only (used when no `lint:` entry matches a changed
# file). Lifeline prefers the user's command always. eslint runs with NO root-config guard so
# flat config (eslint.config.js) is honored; the tool resolves its own config / exit code.
lint_fallback:
  ".py":  "ruff check {file}"
  ".go":  "gofmt -l {file}"
  ".php": "phpcs {file}"
  ".js":  "eslint {file}"
  ".jsx": "eslint {file}"
  ".ts":  "eslint {file}"
  ".tsx": "eslint {file}"

# Coverage→smoke (marquee mechanism — see core/skills/coverage-to-smoke/SKILL.md).
coverage_check:
  enabled: true
  min_changed_file_pct: 70
  fail_on_zero: true
  scope: changed_files_only  # never whole-repo

manual_smoke_gate: true      # human verifies success criteria + GAP paths before merge

# model_hint routing for @dispatch_agent (harness maps hints to its own model names;
# harnesses without model selection ignore hints).
model_routing:
  trivial: small
  small: default
  medium: default
  large: default

commit_format:
  subject_template: "[{scope}] {type}({wave_id}): {subject}"
  include_task_list: true
  include_cycle_id: true
  default_type: feat
  type_map:
    new_feature: feat
    bugfix: fix
    refactor: refactor
    docs: docs
    test: test
    chore: chore
